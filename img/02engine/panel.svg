<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4C97FF"/>
      <stop offset="100%" stop-color="#3373CC"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- 装饰图案 -->
  <g opacity="0.18">
    <circle cx="180" cy="140" r="48" fill="#4C97FF"/>
    <circle cx="1040" cy="150" r="32" fill="#3373CC"/>
    <circle cx="1080" cy="540" r="56" fill="#93C5FD"/>
    <rect x="130" y="500" width="110" height="110" rx="28" fill="#BFDBFE"/>
    <rect x="980" y="260" width="90" height="90" rx="24" fill="#DBEAFE"/>
  </g>

  <!-- 主图标 -->
  <g transform="translate(450 110)">
    <!-- 外层蓝色卡片 -->
    <rect x="0" y="0" width="300" height="300" rx="56" fill="url(#accent)"/>

    <!-- 白色面板 -->
    <rect x="55" y="55" width="190" height="190" rx="24" fill="#ffffff"/>

    <!-- 顶部标题条 -->
    <rect x="78" y="78" width="144" height="18" rx="9" fill="#DBEAFE"/>

    <!-- 滑块 -->
    <rect x="78" y="122" width="112" height="12" rx="6" fill="#BFDBFE"/>
    <rect x="78" y="122" width="70" height="12" rx="6" fill="#4C97FF"/>
    <circle cx="148" cy="128" r="11" fill="#3373CC"/>

    <!-- 开关 -->
    <rect x="78" y="158" width="64" height="30" rx="15" fill="#4C97FF"/>
    <circle cx="122" cy="173" r="11" fill="#ffffff"/>

    <!-- 输入框 -->
    <rect x="78" y="205" width="144" height="20" rx="10" fill="#DBEAFE"/>
  </g>

  <!-- 文案 -->
  <text x="600" y="500"
        text-anchor="middle"
        fill="#1E3A8A"
        font-size="42"
        font-family="Arial, 'Microsoft YaHei', sans-serif"
        font-weight="700">
    快速构建设置面板
  </text>

  <!-- 简单几何点缀 -->
  <g opacity="0.22">
    <circle cx="390" cy="200" r="10" fill="#4C97FF"/>
    <circle cx="800" cy="470" r="14" fill="#60A5FA"/>
    <rect x="350" y="470" width="18" height="18" rx="6" fill="#93C5FD"/>
    <rect x="835" y="180" width="22" height="22" rx="7" fill="#BFDBFE"/>
  </g>
</svg>
